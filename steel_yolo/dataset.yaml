# YOLO 数据集配置 - 钢铁表面缺陷检测
# 基于 NEU-DET 数据集

# 数据集根目录（相对于此文件所在目录）
path: data

# 训练集、验证集、测试集路径
train: train/train.txt   # 训练集图像路径列表（1260张）
val: train/val.txt       # 验证集图像路径列表（14张）
test: train/test.txt     # 测试集图像路径列表（126张）

# 缺陷类别（6类）
names:
  0: crazing          # 龟裂
  1: inclusion        # 夹杂
  2: pitted_surface   # 点蚀
  3: scratches        # 划痕
  4: patches          # 斑块
  5: rolled-in_scale  # 氧化铁皮压入

# 数据集信息
# 图片尺寸: 200x200 (灰度图)
# 训练集: 1260张 | 验证集: 14张 | 测试集: 126张 | 竞赛测试集: 400张